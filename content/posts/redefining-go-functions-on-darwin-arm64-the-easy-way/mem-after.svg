<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" font-family="monospace" font-size="14">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <clipPath id="vm-clip">
      <rect x="20" y="20" width="220" height="280" rx="4"/>
    </clipPath>
    <clipPath id="pm-clip">
      <rect x="360" y="70" width="220" height="230" rx="4"/>
    </clipPath>
  </defs>

  <!-- Virtual Memory (5 rows: text, data, bss, ..., new text) -->
  <g clip-path="url(#vm-clip)">
    <rect x="20" y="20" width="220" height="30" fill="#4a90d9"/>
    <rect x="20" y="50" width="220" height="250" fill="#e8f0fe"/>
    <line x1="20" y1="100" x2="240" y2="100" stroke="#4a90d9" stroke-width="1"/>
    <line x1="20" y1="150" x2="240" y2="150" stroke="#4a90d9" stroke-width="1"/>
    <line x1="20" y1="200" x2="240" y2="200" stroke="#4a90d9" stroke-width="1"/>
    <line x1="20" y1="250" x2="240" y2="250" stroke="#4a90d9" stroke-width="1"/>
  </g>
  <rect x="20" y="20" width="220" height="280" fill="none" stroke="#4a90d9" stroke-width="1.5" rx="4"/>
  <text x="130" y="40" text-anchor="middle" fill="white" font-weight="bold">VIRTUAL MEMORY</text>
  <text x="35" y="80" fill="#222">new text</text>
  <text x="225" y="80" text-anchor="end" fill="#666" font-size="12">r-x</text>
  <text x="35" y="130" fill="#222">data</text>
  <text x="225" y="130" text-anchor="end" fill="#666" font-size="12">rw-</text>
  <text x="35" y="180" fill="#222">bss</text>
  <text x="225" y="180" text-anchor="end" fill="#666" font-size="12">rw-</text>
  <text x="35" y="230" fill="#222">...</text>
  <text x="35" y="280" fill="#222">new text</text>
  <text x="225" y="280" text-anchor="end" fill="#666" font-size="12">rw-</text>

  <!-- Physical Memory (4 rows: data, bss, ..., new text — no text row) -->
  <!-- Box starts at y=70 so data/bss/.../new text rows align horizontally with virtual -->
  <g clip-path="url(#pm-clip)">
    <rect x="360" y="70" width="220" height="30" fill="#5a9e6f"/>
    <rect x="360" y="100" width="220" height="200" fill="#e8fef0"/>
    <line x1="360" y1="150" x2="580" y2="150" stroke="#5a9e6f" stroke-width="1"/>
    <line x1="360" y1="200" x2="580" y2="200" stroke="#5a9e6f" stroke-width="1"/>
    <line x1="360" y1="250" x2="580" y2="250" stroke="#5a9e6f" stroke-width="1"/>
  </g>
  <rect x="360" y="70" width="220" height="230" fill="none" stroke="#5a9e6f" stroke-width="1.5" rx="4"/>
  <text x="470" y="90" text-anchor="middle" fill="white" font-weight="bold">PHYSICAL MEMORY</text>
  <text x="375" y="130" fill="#222">data</text>
  <text x="375" y="180" fill="#222">bss</text>
  <text x="375" y="230" fill="#222">...</text>
  <text x="375" y="280" fill="#222">new text</text>

  <!-- Direct arrows: data, bss, ... -->
  <line x1="240" y1="125" x2="358" y2="125" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="175" x2="358" y2="175" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="225" x2="358" y2="225" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Two arrows into physical "new text" -->
  <!-- 1. virtual "new text" -> physical "new text" (direct, slightly below center) -->
  <line x1="240" y1="281" x2="358" y2="281" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 2. virtual "text" -> physical "new text" (S-curve through center gap, slightly above center) -->
  <path d="M 240,75 C 300,75 300,269 358,269" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
